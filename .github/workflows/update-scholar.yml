name: Update Scholar Data

# Polite daily refresh of Google Scholar stats.
# Tier 1 (lightweight profile-page GET) runs every day. Tier 2 (full
# `scholarly` scrape) only runs when Tier 1 sees a change in total
# citations, or when the workflow is manually dispatched with force=true.
on:
  schedule:
    # Once a day at 03:17 UTC (off-peak; non-round minute to avoid the
    # top-of-hour bot-traffic spike that Scholar rate-limits hardest).
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a full (Tier 2) scrape even if the lightweight check sees no change."
        type: boolean
        default: false
  push:
    paths:
      - "scripts/fetch_scholar.py"
      - "scripts/requirements.txt"
      - ".github/workflows/update-scholar.yml"

permissions:
  contents: write

concurrency:
  group: update-scholar
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Fetch Google Scholar stats
        env:
          SCHOLAR_ID: Jwg8XugAAAAJ
          FORCE_REFRESH: ${{ inputs.force }}
        run: python scripts/fetch_scholar.py

      - name: Commit and push refreshed data (retry-safe)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # If the fetch wrote nothing different, exit early.
          if git diff --quiet -- data/scholar.json; then
            echo "No changes in scholar data."
            exit 0
          fi

          # Stash the freshly-written data outside the working tree so we
          # can re-apply it after each `reset --hard` below.
          cp data/scholar.json /tmp/scholar.json.new

          # The scholarly fetch can take 10+ minutes on a bad day. By
          # the time we push, the remote may have moved on (a human
          # pushed something, or a previous run finished). Hard-reset
          # to the latest origin/main + re-apply the new data + commit
          # + push. Retry up to 3 times.
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/scholar.json.new data/scholar.json

            if git diff --quiet -- data/scholar.json; then
              echo "Data is already current on remote; nothing to push."
              exit 0
            fi

            git add data/scholar.json
            git commit -m "chore(data): refresh Google Scholar snapshot"
            if git push; then
              exit 0
            fi
            echo "[warn] push attempt $attempt failed; sleeping 10s and retrying."
            sleep 10
          done
          echo "[error] could not push after 3 attempts."
          exit 1
